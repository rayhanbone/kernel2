name: Upload Kernel to Release

on:
  workflow_dispatch:
    inputs:
      kernel_url:
        description: 'URL kernel (Google Drive / Mediafire / Mega / Direct Link)'
        required: true
        type: string
      kernel_mu:
        description: "Pilih tipe/sumber kernel"
        required: false
        default: "s905x4"
        type: choice
        options:
          - s905x4
          - stable
          - dev
          - beta    
          - dtb  
      rename_rootfs:
        description: "Nama baru file (tanpa ekstensi .tar.gz)"
        required: true
        default: "kernel-package"
      target_repo:
        description: "Pilih repo tujuan upload"
        required: false
        default: "tes-rep"
        type: choice
        options:
          - tes-rep
          - Dirgha80
          - Houjie80
      # Input tambahan agar variabel pada Release Body terisi dengan benar
      kernel_source:
        description: "Informasi Source Code Kernel"
        required: false
        default: "Official / Custom Source"
      kernel_toolchain:
        description: "Toolchain yang digunakan (misal: GCC 14.2)"
        required: false
        default: "GCC 14.2 ARM64"
      kernel_version:
        description: "Versi Kernel (misal: 6.12.0)"
        required: false
        default: "6.12.x"
      kernel_sign:
        description: "Nama/Keterangan Kernel"
        required: false
        default: "Amlogic-Kernel"

jobs:
  upload_kernel_release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip tar gzip qemu-utils mkisofs jq python3 python3-pip
          
          # Install modul Python pendukung
          pip install --break-system-packages telethon colorama
          sudo pip3 install --break-system-packages gdown
          sudo pip3 install --break-system-packages git+https://github.com/Juvenal-Yescas/mediafire-dl
          
          # Install MEGA CMD Client untuk unduh link mega.nz
          wget -q https://mega.nz/linux/repo/xUbuntu_24.04/amd64/megacmd-xUbuntu_24.04_amd64.deb
          sudo apt-get install -y ./megacmd-xUbuntu_24.04_amd64.deb || sudo apt-get install -f -y
          rm -f megacmd-xUbuntu_24.04_amd64.deb

          # Buat direktori kerja
          sudo mkdir -p /workdir/build
          sudo chown -R $USER:$GROUPS /workdir

      - name: Set Token and Target Repo
        id: choose_target
        run: |
          case "${{ inputs.target_repo }}" in
            tes-rep)
              echo "PAT=${{ secrets.TARGET_REPO_TES }}" >> $GITHUB_ENV
              echo "REPO_TARGET=tes-rep/kernel" >> $GITHUB_ENV ;;
            Dirgha80)
              echo "PAT=${{ secrets.TARGET_REPO_DIRGHA80 }}" >> $GITHUB_ENV
              echo "REPO_TARGET=Dirgha80/kernel" >> $GITHUB_ENV ;;
            Houjie80)
              echo "PAT=${{ secrets.TARGET_REPO_HOUJIE80 }}" >> $GITHUB_ENV
              echo "REPO_TARGET=Houjie80/kernel2" >> $GITHUB_ENV ;;
            *)
              echo "::error ::Pilihan repo tidak valid!"; exit 1 ;;
          esac

      - name: Download Kernel
        run: |
          URL="${{ inputs.kernel_url }}"
          OUT_FILE="/workdir/build/${{ inputs.rename_rootfs }}.tar.gz"

          echo "Mengunduh file dari: $URL"

          if echo "$URL" | grep -q "drive.google.com\|drive.usercontent.google.com"; then
            echo "Deteksi link Google Drive..."
            gdown "$URL" -O "$OUT_FILE" --fuzzy
          elif echo "$URL" | grep -q "mediafire.com"; then
            echo "Deteksi link Mediafire..."
            mediafire-dl "$URL" -o "$OUT_FILE"
          elif echo "$URL" | grep -q "mega.nz"; then
            echo "Deteksi link MEGA..."
            mega-get "$URL" /workdir/build/
            # Rename file terunduh pertama jika namanya belum sesuai
            DOWNLOADED_FILE=$(ls /workdir/build/ | head -n 1)
            if [ -f "/workdir/build/$DOWNLOADED_FILE" ]; then
              mv "/workdir/build/$DOWNLOADED_FILE" "$OUT_FILE"
            fi
          else
            echo "Deteksi Direct Link / Wget..."
            wget --no-check-certificate "$URL" -O "$OUT_FILE"
          fi

          # Buat symlink ke workspace agar action upload mudah menemukan foldernya
          ln -sf /workdir/build $GITHUB_WORKSPACE/build

      - name: Upload Release Asset (Repo Lokal)
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/*
          tag: kernel_${{ inputs.kernel_mu }}
          file_glob: true
          overwrite: true
          body: |
            ### Kernel Details
            - **Kernel Source:** ${{ inputs.kernel_source }}
            - **Toolchain:** ${{ inputs.kernel_toolchain }}
            - **Kernel Version:** ${{ inputs.kernel_version }}
            - **Kernel Name:** ${{ inputs.kernel_sign }}
            - **Type:** `${{ inputs.kernel_mu }}`

            ---
            ## Supported Devices
            | Amlogic | MODEL | WIFI |
            | -------- | ------- | ------- |
            | **S905X**  | **HG680P**<br>**B860H** | **ON**<br>**NOT TEST** |
            | **S905X4** | **ADVAN AT01**<br>**AKARI** | **OFF**<br>**OFF** |
            | **S905X2** | **HG680FJ** | **NOT TEST** (`-`) |

      - name: Upload Kernel to Release (Repo Tujuan)
        uses: softprops/action-gh-release@v2
        if: success() && !cancelled()
        env:
          GITHUB_TOKEN: ${{ env.PAT }}
        with:
          tag_name: kernel_${{ inputs.kernel_mu }}
          repository: ${{ env.REPO_TARGET }}
          name: Kernel_${{ inputs.kernel_mu }}
          body: |
            ### Kernel Build Information
            - **Version:** `${{ inputs.kernel_version }}`
            - **Toolchain:** `${{ inputs.kernel_toolchain }}`
            - **Signature:** `${{ inputs.kernel_sign }}`
            - **Kernel Type:** `${{ inputs.kernel_mu }}`

            ---
            ## Supported Devices
            | Amlogic | MODEL | WIFI |
            | -------- | ------- | ------- |
            | **S905X**  | **HG680P**<br>**B860H** | **ON**<br>**NOT TEST** |
            | **S905X4** | **ADVAN AT01**<br>**AKARI** | **OFF**<br>**OFF** |
            | **S905X2** | **HG680FJ** | **NOT TEST** (`-`) |
          files: build/*
