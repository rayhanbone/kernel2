#==========================================================================
# Description: Compile kernel v2
#==========================================================================

name: Compile Kernel v2

on:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: "Select the kernel source"
        required: false
        default: "tes-rep"
        type: choice
        options:
          - unifreq
          - codesnas
          - Dirgha80
          - Houjie80
          - tes-rep
          - tes-rep@tes
          - sib0ndt/linux-6.1.66
      kernel_version:
        description: "Select kernel version"
        required: false
        default: "6.12.y"
        type: choice
        options:
          - 5.4.y
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.13.y
          - 6.14.y
          - 6.1.66
          - 5.4.y_5.10.y
          - 5.15.y_6.1.y
          - 6.6.y_6.12.y
      kernel_auto:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      delete_source:
        description: "Delete the source after compilation"
        required: false
        default: true
        type: boolean
      kernel_package:
        description: "Select compile package list"
        required: false
        default: "all"
        type: choice
        options: [all, dtbs]
      kernel_toolchain:
        description: "Select the compilation toolchain"
        required: false
        default: "gcc"
        type: choice
        options: [clang, gcc, gcc-14.2]
      compress_format:
        description: "Set the initrd compression format"
        required: false
        default: "xz"
        type: choice
        options: [xz, gzip, zstd, lzma]
      kernel_sign:
        description: "Set the kernel custom signature"
        required: false
        default: "-Hj"
        type: string
      kernel_config:
        description: "Set the path of kernel .config"
        required: false
        default: "kernel-config/release/general"
        type: choice
        options:
          - kernel-config/release/s905x4
          - kernel-config/release/general
          - kernel-config/release/DBAI
          - "false"
      kernel_mu:
        description: "Select kernel tag designation"
        required: false
        default: "s905x4"
        type: choice
        options: [s905x4, stable, dev, beta, dtb]

env:
  TZ: Asia/Jakarta
  PACKAGED_OUTPUTPATH: /builder/output

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: write
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialization Environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 1. Bersihkan sisa direktori/file besar (JANGAN gunakan docker rmi)
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}" || true
          sudo rm -rf /usr/share/dotnet /mnt/swapfile /root/.cargo ~/.rustup 2>/dev/null || true
          sudo swapoff -a || true
          sudo -E apt-get update
          
          # 2. Install QEMU & modul binfmt pendukung emulasi ARM64
          sudo -E apt-get install -y qemu-user-static binfmt-support qemu-utils

          # 3. Aktifkan dan restart binfmt_misc
          sudo update-binfmts --enable qemu-aarch64
          sudo systemctl restart systemd-binfmt 2>/dev/null || true
          
          # 4. Pastikan biner QEMU tersalin ke path sistem
          sudo cp -f /usr/bin/qemu-aarch64-static /usr/local/bin/ 2>/dev/null || true
          
          # 5. Install paket pembangun Armbian
          BUILD_PACKAGES=$(curl -fsSL https://tinyurl.com/ubuntu2204-build-armbian)
          sudo -E apt-get -y install ${BUILD_PACKAGES}
          
          sudo timedatectl set-timezone "${TZ}"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create Simulated Physical Disk (LVM)
        id: disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[a-zA-Z]*//g' | cut -d. -f1) - 1 2>/dev/null || echo 15)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[a-zA-Z]*//g' | cut -d. -f1) - 4 2>/dev/null || echo 15)
          
          [ "$mnt_size" -le 0 ] && mnt_size=10
          [ "$root_size" -le 0 ] && root_size=10

          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th

      - name: Create Mapped Directory
        id: mapped
        working-directory: /builder
        run: |
          mkdir -p /builder/{kernel,output}
          
          ACTION_DIR=$(find /home/runner/work/_actions -type d -path "*/Dirgha80/amlogic-s9xxx-armbian/*/compile-kernel" | head -n 1)
          if [ -z "$ACTION_DIR" ]; then
            ACTION_DIR="/home/runner/work/_actions/Dirgha80/amlogic-s9xxx-armbian/main/compile-kernel"
            mkdir -p "$ACTION_DIR"
          fi

          ln -sf /builder/kernel "$ACTION_DIR/kernel"
          ln -sf /builder/output "$ACTION_DIR/output"
          
          ln -sf /builder/kernel $GITHUB_WORKSPACE/kernel
          ln -sf /builder/output $GITHUB_WORKSPACE/output
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Validate Kernel Config Path
        run: |
          if [[ "${{ inputs.kernel_config }}" != "false" && ! -d "${{ inputs.kernel_config }}" ]]; then
            echo "❌ ERROR: Kernel config path not found: ${{ inputs.kernel_config }}"
            exit 1
          fi

      - name: Apply Custom Patches (if source exists)
        run: |
          PATCH_DIR="${GITHUB_WORKSPACE}/patches/${{ inputs.kernel_version }}"
          if [ -d "$PATCH_DIR" ] && [ -d "/builder/kernel" ] && [ -n "$(ls -A /builder/kernel 2>/dev/null)" ]; then
            echo "📦 Found patches in $PATCH_DIR"
            for patch in "$PATCH_DIR"/*.patch; do
              [ -e "$patch" ] || continue
              echo "➡️ Applying $patch"
              patch -d /builder/kernel -p1 < "$patch" || { echo "❌ Failed patch: $patch"; exit 1; }
            done
          else
            echo "ℹ️ No patches applied at this stage."
          fi

      - name: Compile the Kernel [${{ inputs.kernel_version }}]
        uses: Dirgha80/amlogic-s9xxx-armbian@main
        if: steps.mapped.outputs.status == 'success' && !cancelled()
        with:
          build_target: kernel
          kernel_source: ${{ inputs.kernel_source || 'tes-rep' }}
          kernel_version: ${{ inputs.kernel_version || '6.12.y' }}
          kernel_auto: ${{ inputs.kernel_auto || true }}
          delete_source: ${{ inputs.delete_source || true }}
          kernel_package: ${{ inputs.kernel_package || 'all' }}
          kernel_toolchain: ${{ inputs.kernel_toolchain || 'gcc' }}
          kernel_sign: ${{ inputs.kernel_sign || '-Hj' }}
          kernel_config: ${{ inputs.kernel_config || 'kernel-config/release/general' }}
          compress_format: ${{ inputs.compress_format || 'xz' }}
          silent_log: true

      - name: Check Output Files
        id: check_output
        run: |
          if [ -n "$(ls -A /builder/output 2>/dev/null)" ]; then
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "Build output files found:"
            ls -lh /builder/output
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "::warning::Folder /builder/output kosong! Hasil kompilasi tidak ditemukan."
          fi

      - name: Dump Kernel Config Preview
        if: always()
        run: |
          echo "===== Kernel .config Preview ====="
          cat /builder/kernel/.config 2>/dev/null || echo "No .config file found"

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ inputs.kernel_version }}
          path: /builder/output/*.log
          if-no-files-found: ignore

      - name: Upload Kernel to Release
        uses: ncipollo/release-action@v1
        if: steps.check_output.outputs.has_files == 'true' && !cancelled()
        with:
          tag: kernel_${{ inputs.kernel_mu }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### Kernel Build Summary
            - **Kernel Source:** `${{ inputs.kernel_source }}`
            - **Version:** `${{ inputs.kernel_version }}`
            - **Toolchain:** `${{ inputs.kernel_toolchain }}`
            - **Config:** `${{ inputs.kernel_config }}`
            - **Signature:** `${{ inputs.kernel_sign }}`
            - **Tag Designation:** `${{ inputs.kernel_mu }}`

      - name: Cleanup Loop Devices and Mounts
        if: always()
        run: |
          sudo umount /builder 2>/dev/null || true
          sudo vgremove -f github 2>/dev/null || true
          sudo losetup -D 2>/dev/null || true
