name: Build Linux 6.12.y Kernel

on:
  workflow_dispatch: # Memungkinkan build dipicu secara manual dari tab Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses-dev bison flex libssl-dev libelf-dev \
            bc git wget curl ccache u-boot-tools crossbuild-essential-arm64 \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu device-tree-compiler xz-utils

      - name: Clone Linux Kernel Source
        run: |
          git clone --depth 1 -b main https://github.com/rayhanbone/linux-6.12.y.git linux-src

      - name: Fetch Kernel Patch & Config from kernel2 Repository
        run: |
          git clone --depth 1 -b main https://github.com/rayhanbone/kernel2.git kernel2-repo
          
          # Salin config-6.12 ke direktori kernel source
          cp kernel2-repo/kernel-config/release/general/config-6.12 linux-src/.config

      - name: Apply Kernel Patches Safe Mode
        run: |
          cd linux-src
          PATCH_DIR="../kernel2-repo/kernel-patch/beta/linux-6.12.y"
          
          if [ -d "$PATCH_DIR" ]; then
            echo "Applying patches from $PATCH_DIR..."
            
            # Matikan penghentian skrip otomatis saat perintah patch gagal/skip
            set +e
            
            for patch in "$PATCH_DIR"/*.patch; do
              if [ -f "$patch" ]; then
                echo "------------------------------------------"
                echo "Processing patch: $patch"
                
                # 'git apply' secara pintar memasukkan patch yang belum ada
                # dan mengabaikan bagian yang sudah ada di source code tanpa prompt error
                git apply --reject --whitespace=fix "$patch" 2>/dev/null
                
                if [ $? -eq 0 ]; then
                  echo "RESULT: Patch applied cleanly."
                else
                  echo "RESULT: Patch skipped or partially applied (source already contains changes)."
                fi
              fi
            done
            
            # Kembalikan fitur penghentian skrip bawaan Bash
            set -e
          else
            echo "Directory patch $PATCH_DIR tidak ditemukan, melewati proses patching."
          fi

      - name: Prepare Kernel Configuration
        run: |
          cd linux-src
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make olddefconfig

      - name: Compile Kernel Image & Modules
        run: |
          cd linux-src
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          make -j$(nproc) Image dtbs modules

      - name: Prepare Artifacts Package
        run: |
          cd linux-src
          mkdir -p ../output/boot
          
          # Salin Kernel Image
          cp arch/arm64/boot/Image ../output/boot/
          
          # Salin Device Tree Blobs (DTB)
          cp -r arch/arm64/boot/dts/amlogic ../output/boot/ 2>/dev/null || true
          cp -r arch/arm64/boot/dts/rockchip ../output/boot/ 2>/dev/null || true
          
          # Install modul ke folder output
          mkdir -p ../output/modules
          make INSTALL_MOD_PATH=../output/modules modules_install
          
          # Informasi versi kernel & tanggal build
          KERNEL_VER=$(make kernelrelease)
          BUILD_DATE=$(date +'%Y.%m.%d-%H%M')
          
          # Penandaan Sign -reyre & Format File .tar.xz
          ARCHIVE_NAME="kernel-6.12.y-${KERNEL_VER}-${BUILD_DATE}-reyre.tar.xz"
          
          echo "KERNEL_VER=$KERNEL_VER" >> $GITHUB_ENV
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV
          
          # Kompres output menjadi format tar.xz
          cd ../
          TAR_OPTIONS="--xz" tar -cvf "$ARCHIVE_NAME" -C output .

      - name: Create or Update Release 6.12.y
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "6.12.y"
          name: "Kernel Linux 6.12.y (reyre)"
          body: |
            ## Automated Build Kernel Linux 6.12.y
            * **Signed By:** reyre
            * **Kernel Version:** ${{ env.KERNEL_VER }}
            * **Last Build Date:** ${{ env.BUILD_DATE }}
            * **Config:** `config-6.12`
            * **Patch Source:** `kernel-patch/beta/linux-6.12.y`
          files: |
            ${{ env.ARCHIVE_NAME }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
