name: Compile General Kernel

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: "Select the kernel source"
        required: false
        default: "rayhanbone"
        type: choice
        options:
          - rayhanbone
          - unifreq
          - codesnas
          - Dirgha80
          - Houjie80
      kernel_version:
        description: "Select kernel version"
        required: false
        default: "6.12.y"
        type: choice
        options:
          - 5.4.y
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.14.y
          - 6.12.y
      kernel_auto:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      kernel_package:
        description: "Select compile package list"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - dtbs
      kernel_toolchain:
        description: "Select the compilation toolchain"
        required: false
        default: "gcc"
        type: choice
        options:
          - clang
          - gcc
          - gcc-11.3
          - gcc-12.2
          - gcc-12.3
          - gcc-13.2
          - gcc-13.3
      compress_format:
        description: "Set the initrd compression format"
        required: false
        default: "xz"
        type: choice
        options:
          - xz
          - gzip
          - zstd
          - lzma
      kernel_sign:
        description: "Set the kernel custom signature"
        required: false
        default: "-reyre"
        type: string
      kernel_config:
        description: "Set the path of kernel .config"
        required: false
        default: "kernel-config/release/general"
        type: choice
        options:
          - kernel-config/release/general
          - "false"

env:
  TZ: Asia/Jakarta

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: Checkout Workspace
        uses: actions/checkout@v4

      - name: Initialization environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://tinyurl.com/ubuntu2204-build-armbian)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo timedatectl set-timezone "${TZ}"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Ensure Docker is Running
        run: |
          sudo systemctl unmask docker || true
          sudo systemctl start docker || true
          docker info

      - name: Compile the kernel [ ${{ inputs.kernel_version }} ]
        uses: ophub/amlogic-s9xxx-armbian@main
        with:
          build_target: kernel
          kernel_source: ${{ inputs.kernel_source || 'rayhanbone' }}
          kernel_version: ${{ inputs.kernel_version || '6.12.y' }}
          kernel_auto: ${{ inputs.kernel_auto || true }}
          kernel_package: ${{ inputs.kernel_package || 'all' }}
          kernel_toolchain: ${{ inputs.kernel_toolchain || 'gcc' }}
          kernel_sign: ${{ inputs.kernel_sign || '-reyre' }}
          kernel_config: ${{ inputs.kernel_config || 'kernel-config/release/DBAI' }}
          compress_format: ${{ inputs.compress_format || 'xz' }}

      - name: Upload Kernel to Release
        uses: ncipollo/release-action@v1
        if: env.PACKAGED_STATUS == 'success' && !cancelled()
        with:
          tag: ${{ inputs.kernel_source }}_${{ inputs.kernel_version }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### Kernel Build Details
            - **Source:** `${{ inputs.kernel_source }}`
            - **Version:** `${{ inputs.kernel_version }}`
            - **Toolchain:** `${{ inputs.kernel_toolchain }}`
            - **Signature:** `${{ inputs.kernel_sign }}`
            - **Compress Format:** `${{ inputs.compress_format }}`

            ---
            * **Kernel Source Repository:** https://github.com/rayhanbone/linux-6.12.y
            * **Workflow Source:** https://github.com/rayhanbone/kernel2/blob/main/.github/workflows/6.12.y.yml
            * **Patch Directory:** https://github.com/rayhanbone/kernel2/tree/main/kernel-patch/beta/linux-6.12.y
            * **Config File:** https://github.com/rayhanbone/kernel2/blob/main/kernel-config/release/DBAI/config-6.12
