name: Build Linux 6.12.y Kernel

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: 'rayhanbone/linux-6.12.y'
          ref: 'linux-6.12.y'
          path: 'linux-source'

      - name: Checkout Config & Patch Repository
        uses: actions/checkout@v4
        with:
          repository: 'rayhanbone/kernel2'
          path: 'kernel2-repo'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc git tar xz-utils gcc-aarch64-linux-gnu

      - name: Apply Kernel Patches
        run: |
          cd linux-source
          echo "Applying patches..."
          set +e # Mencegah workflow terhenti jika ada warning/skip pada patch
          
          for patch in ../kernel2-repo/kernel-patch/beta/linux-6.12.y/*.patch; do
            if [ -f "$patch" ]; then
              echo "----------------------------------------"
              echo "Applying: $(basename "$patch")"
              echo "----------------------------------------"
              # Coba gunakan git apply dahulu, jika gagal fallback ke patch biasa dengan toleransi tinggi
              git apply --whitespace=fix "$patch" || patch -p1 --ignore-whitespace -f < "$patch" || true
            fi
          done
          
          set -e # Kembalikan mode strict error handling

      - name: Apply Kernel Config
        run: |
          cp kernel2-repo/config-6.12 linux-source/.config
          cd linux-source
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: Build Kernel (Tarball Package)
        run: |
          cd linux-source
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc) bindeb-pkg || make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc) Image dtbs modules

      - name: Compress Kernel Output (.tar.xz)
        run: |
          mkdir -p output
          # Sesuaikan direktori/file hasil kompilasi yang ingin dikemas
          tar -cJf output/linux-6.12.y-arm64-reyre.tar.xz -C linux-source/arch/arm64/boot Image dts

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: "6.12.y"
          name: "Linux Kernel 6.12.y ARM64 Build"
          files: output/linux-6.12.y-arm64-reyre.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
