name: Compile Release Repo Ini

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: "Select the kernel source"
        required: false
        default: "tes-rep"
        type: choice
        options:
          - unifreq
          - codesnas
          - Dirgha80
          - Houjie80
          - tes-rep
          - tes-rep@tes
          - feryw@dev
          - feryw/linux@amlogic-6.18
          - tes-rep/linux@amlogic-6.18
          - sib0ndt/linux-6.1.66
          - chewitt/linux@amlogic-6.17.y
          - tes-rep/linuxx@amlogic-6.18.y
          - tes-rep/linuxx@amlogic-6.17.y
          - tes-rep/linux@linux-6.17.y
          - tes-rep/linux@linux-6.18.y
      kernel_version:
        description: "Select kernel version"
        required: false
        default: "6.6.y_6.12.y"
        type: choice
        options:
          - 5.4.y
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.13.y
          - 6.14.y
          - 6.12.y
          - 6.1.66
          - 5.4.y_5.10.y
          - 5.15.y_6.1.y
          - 6.6.y_6.12.y
          - 6.17.y
          - 6.18.y
      kernel_auto:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      delete_source:
        description: "Delete the source after compilation"
        required: false
        default: true
        type: boolean    
      kernel_package:
        description: "Select compile package list"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - dtbs
      kernel_toolchain:
        description: "Select the compilation toolchain"
        required: false
        default: "gcc"
        type: choice
        options:
          - clang
          - gcc
          - gcc-14.2
      kernel_sign:
        description: "Set the kernel custom signature"
        required: false
        default: "-reyre"
        type: string
      kernel_config:
        description: "Set the path of kernel .config"
        required: false
        default: "kernel-config/release/Tes"
        type: choice
        options:
          - kernel-config/release/s905x4
          - kernel-config/release/general
          - kernel-config/release/DBAI
          - kernel-config/release/Tes
          - "false"
      kernel_mu:
        description: "Select the kernel tag designation"
        required: false
        default: "wifi_on"
        type: choice
        options:
          - s905x4
          - stable
          - dev
          - beta    
          - dtb
          - wifi_on

env:
  TZ: Asia/Jakarta
  PACKAGED_OUTPUTPATH: /builder/output

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: write
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialization Environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}" || true
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android 2>/dev/null || true
          sudo swapoff -a || true
          sudo rm -f /swapfile /mnt/swapfile || true
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          
          # Unduh daftar paket dependensi build
          BUILD_PACKAGES=$(curl -fsSL https://tinyurl.com/ubuntu2204-build-armbian)
          sudo -E apt-get -y install ${BUILD_PACKAGES}
          
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile} 2>/dev/null || true
          sudo rm -rf ~/{.cargo,.dotnet,.rustup} 2>/dev/null || true
          sudo timedatectl set-timezone "${TZ}"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create Simulated Physical Disk (LVM)
        id: disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1 2>/dev/null || echo 15)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4 2>/dev/null || echo 15)
          
          # Fallback jika kalkulasi menghasilkan angka <= 0
          [ "$mnt_size" -le 0 ] && mnt_size=10
          [ "$root_size" -le 0 ] && root_size=10

          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th

      - name: Create Mapped Directory
        id: mapped
        working-directory: /builder
        run: |
          df -hT ${PWD}
          mkdir -p /builder/{kernel,output}
          
          # Buat struktur direktori actions bawaan runner
          ACTION_DIR="/home/runner/work/_actions/Dirgha80/amlogic-s9xxx-armbian/main/compile-kernel"
          mkdir -p "$ACTION_DIR"

          ln -sf /builder/kernel "$ACTION_DIR/kernel"
          ln -sf /builder/output "$ACTION_DIR/output"
          ln -sf /builder/kernel "${GITHUB_WORKSPACE}/kernel"
          ln -sf /builder/output "${GITHUB_WORKSPACE}/output"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Compile the Kernel [ ${{ inputs.kernel_version }} ]
        uses: Dirgha80/amlogic-s9xxx-armbian@main
        if: steps.mapped.outputs.status == 'success' && !cancelled()
        with:
          build_target: kernel
          kernel_source: ${{ inputs.kernel_source || 'tes-rep' }}
          kernel_version: ${{ inputs.kernel_version || '6.6.y_6.12.y' }}
          kernel_auto: ${{ inputs.kernel_auto || true }}
          delete_source: ${{ inputs.delete_source || true }}
          kernel_package: ${{ inputs.kernel_package || 'all' }}
          kernel_toolchain: ${{ inputs.kernel_toolchain || 'gcc' }}
          kernel_sign: ${{ inputs.kernel_sign || '-reyre' }}
          kernel_config: ${{ inputs.kernel_config || 'kernel-config/release/Tes' }}
          compress_format: xz
          silent_log: true

      - name: Check Output Files
        id: check_output
        run: |
          if [ -n "$(ls -A /builder/output 2>/dev/null)" ]; then
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "File hasil kompilasi ditemukan:"
            ls -lh /builder/output
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "::warning::Folder /builder/output kosong! Kompilasi gagal atau tidak menghasilkan output."
          fi

      - name: Upload Kernel to Release
        uses: ncipollo/release-action@v1
        if: steps.check_output.outputs.has_files == 'true' && !cancelled()
        with:
          tag: kernel_${{ inputs.kernel_mu }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### Kernel Build Summary
            - **Source Code:** `${{ inputs.kernel_source }}`
            - **Kernel Version:** `${{ inputs.kernel_version }}`
            - **Toolchain:** `${{ inputs.kernel_toolchain }}`
            - **Signature:** `${{ inputs.kernel_sign }}`
            - **Kernel Type Tag:** `${{ inputs.kernel_mu }}`
            
            ---
            ## Supported Devices
            | Amlogic | MODEL | WIFI |
            | -------- | ------- | ------- |
            | **S905X**  | **HG680P**<br>**B860H** | **ON**<br>**NOT TEST** |
            | **S905X4** | **ADVAN AT01**<br>**AKARI** | **OFF**<br>**OFF** |
            | **S905X2** | **HG680FJ** | **NOT TEST** (`-`) |

      - name: Cleanup Loop Devices and Mounts
        if: always()
        run: |
          sudo umount /builder 2>/dev/null || true
          sudo vgremove -f github 2>/dev/null || true
          sudo losetup -D 2>/dev/null || true
